services:
  - type: web
    name: somromscan-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://somromscan-mrv.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.0

services:
  - type: web
    name: somromscan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        value: somromscan-mrv-secret-2569
      - key: PYTHON_VERSION
        value: 3.11.0
